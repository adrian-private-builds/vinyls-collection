name: Daily Sync

on:
  schedule:
    - cron: '0 8 * * *'   # every day at 8am UTC
  workflow_dispatch:        # also allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync Discogs collection
        run: python3 sync.py HouseOfMraua 5236072 ${{ secrets.DISCOGS_TOKEN }}

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html collection.json
          git diff --cached --quiet || git commit -m "chore: daily sync $(date -u '+%Y-%m-%d')"
          git push
